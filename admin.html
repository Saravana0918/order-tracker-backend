<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      padding: 20px;
    }

    h2 {
      margin-bottom: 15px;
    }

    .login-box {
      max-width: 300px;
      margin: auto;
      margin-top: 100px;
      background: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    input, select {
      padding: 10px;
      margin: 5px;
    }

    button {
      padding: 10px;
      border: none;
      background: black;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    .hidden { display: none; }

    .filters {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 5px 10px rgba(0,0,0,0.1);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background: black;
      color: white;
      padding: 10px;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }

    tr:hover {
      background: #f1f1f1;
    }

    .pagination {
      margin-top: 20px;
      text-align: center;
    }

    .pagination button {
      padding: 8px 14px;
      margin: 5px;
      border-radius: 6px;
    }

    .active-page {
      background: green !important;
    }

    .info {
      margin-top: 10px;
      text-align: center;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="login-box">
  <h3>Admin Login</h3>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="hidden">

  <h2>🔥 Order Management</h2>

  <div class="filters">
    <input id="searchInput" placeholder="Search Order ID / Email" onkeyup="applyFilters()">
    
    <select id="statusFilter" onchange="applyFilters()">
      <option value="">All Status</option>
      <option value="design">Design</option>
      <option value="printing">Printing</option>
      <option value="fusing">Fusing</option>
      <option value="stitching">Stitching</option>
      <option value="packing">Packing</option>
    </select>

    <input type="date" id="dateFilter" onchange="applyFilters()">
    <select id="rowsSelect" onchange="changeRows()">
  <option value="5">5</option>
  <option value="10">10</option>
  <option value="25">25</option>
  <option value="50" selected>50</option>
  <option value="100">100</option>
</select>

    <button onclick="logout()">Logout</button>
  </div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Order ID</th>
          <th>Email</th>
          <th>Status</th>
          <th>Update</th>
        </tr>
      </thead>
      <tbody id="orders"></tbody>
    </table>
  </div>

  <!-- FIXED PAGINATION -->
  <div class="pagination" id="pagination"></div>
  <div class="info" id="info"></div>

</div>

<script>
let allOrders = [];
let filteredOrders = [];
let currentPage = 1;
let rowsPerPage = 50;

/* LOGIN */
function login(){
  const u = document.getElementById("username").value;
  const p = document.getElementById("password").value;

  if(u === "admin@gmail.com" && p === "Nextprint@123!@#$%^"){
    localStorage.setItem("adminLogin", "true");
    showAdmin();
  } else {
    alert("Invalid login");
  }
}

function logout(){
  localStorage.removeItem("adminLogin");
  location.reload();
}

function changeRows(){
  rowsPerPage = parseInt(document.getElementById("rowsSelect").value);
  currentPage = 1;
  renderTable();
  renderPagination();
}

function showAdmin(){
  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("adminPanel").classList.remove("hidden");
  loadOrders();
}

if(localStorage.getItem("adminLogin") === "true"){
  showAdmin();
}

/* LOAD DATA */
async function loadOrders(){
  const res = await fetch("https://order-tracker-backend-j3l4.onrender.com/api/all-orders");
  allOrders = await res.json();

  filteredOrders = allOrders;
  renderTable();
  renderPagination();
}

/* FILTER */
function applyFilters(){
  const search = document.getElementById("searchInput").value.toLowerCase();
  const status = document.getElementById("statusFilter").value;
  const date = document.getElementById("dateFilter").value;

  filteredOrders = allOrders.filter(o => {
    return (
      (o.order_id.toLowerCase().includes(search) ||
       o.customer_email.toLowerCase().includes(search)) &&
      (!status || o.status === status) &&
      (!date || o.updated_at?.startsWith(date))
    );
  });

  currentPage = 1;
  renderTable();
  renderPagination();
}

/* TABLE */
function renderTable(){
  const start = (currentPage - 1) * rowsPerPage;
  const data = filteredOrders.slice(start, start + rowsPerPage);

  document.getElementById("orders").innerHTML = data.map(o => `
    <tr>
      <td>${o.order_id}</td>
      <td>${o.customer_email}</td>
      <td>${o.status}</td>
      <td>
        <select onchange="updateStatus('${o.order_id}', this.value)">
          <option value="">Change</option>
          <option value="design">Design</option>
          <option value="printing">Printing</option>
          <option value="fusing">Fusing</option>
          <option value="stitching">Stitching</option>
          <option value="packing">Packing</option>
          <option value="completed">Completed</option>
        </select>
      </td>
    </tr>
  `).join("");

  document.getElementById("info").innerText =
    `Showing ${start + 1} to ${Math.min(start + rowsPerPage, filteredOrders.length)} of ${filteredOrders.length} orders`;
}

/* PAGINATION */
function renderPagination(){
  const total = Math.ceil(filteredOrders.length / rowsPerPage);
  let html = "";

  if(currentPage > 1){
    html += `<button onclick="changePage(${currentPage-1})">Prev</button>`;
  }

  for(let i=1;i<=total;i++){
    html += `<button class="${i===currentPage?'active-page':''}" onclick="changePage(${i})">${i}</button>`;
  }

  if(currentPage < total){
    html += `<button onclick="changePage(${currentPage+1})">Next</button>`;
  }

  document.getElementById("pagination").innerHTML = html;
}

function changePage(p){
  currentPage = p;
  renderTable();
  renderPagination();
}

/* UPDATE */
async function updateStatus(order_id, status){
  if(!status) return;

  await fetch("https://order-tracker-backend-j3l4.onrender.com/api/update-status", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({order_id, status})
  });

  alert("✅ Updated");
  loadOrders();
}
</script>

</body>
</html>
